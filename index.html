<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MECHANICAL PRO | الحارث</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; }
        .chat-area { height: 80vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; font-size: 14px; }
        .user { background: #238636; align-self: flex-start; }
        .ai { background: #161b22; border: 1px solid #30363d; align-self: flex-end; }
        .input-box { position: fixed; bottom: 0; width: 100%; background: #161b22; padding: 10px; display: flex; gap: 8px; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px; color: white; outline: none; }
    </style>
</head>
<body>
    <header class="p-4 border-b border-[#30363d] flex justify-between items-center bg-[#161b22]">
        <h1 class="text-sm font-bold text-green-500">MECHANICAL AI v2.5</h1>
        <button onclick="document.getElementById('keyBox').classList.toggle('hidden')" class="text-gray-400">⚙️ الإعدادات</button>
    </header>

    <div id="keyBox" class="hidden fixed inset-0 bg-black/90 z-50 p-6 flex items-center justify-center">
        <div class="bg-[#161b22] p-6 rounded-xl w-full border border-gray-700 max-w-sm">
            <p class="text-sm mb-4">أدخل مفتاح API (الذي استخرجته من جوجل):</p>
            <input id="apiInput" type="password" class="w-full mb-4" placeholder="AIzaSy...">
            <button onclick="saveKey()" class="w-full bg-green-600 p-2 rounded font-bold">حفظ وتفعيل</button>
        </div>
    </div>

    <div id="chat" class="chat-area">
        <div class="ai msg">جاهز لمساعدتك يا مهندس حارث. اطلب حل أي مسألة.</div>
    </div>

    <div class="input-box">
        <input id="userIn" type="text" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" class="bg-green-600 px-4 py-2 rounded-lg font-bold">إرسال</button>
    </div>

    <script>
        let KEY = localStorage.getItem('h_key') || "";
        function saveKey() {
            const k = document.getElementById('apiInput').value;
            if(k) { localStorage.setItem('h_key', k); KEY = k; alert("تم الحفظ!"); document.getElementById('keyBox').classList.add('hidden'); }
        }

        async function send() {
            const i = document.getElementById('userIn');
            const t = i.value.trim();
            if(!t || !KEY) { if(!KEY) document.getElementById('keyBox').classList.remove('hidden'); return; }
            add(t, 'user'); i.value = "";
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "أنت مهندس ميكانيك خبير، حل بدقة: " + t }] }] })
                });
                const d = await r.json();
                add(d.candidates[0].content.parts[0].text, 'ai');
            } catch (e) { add("تأكد من المفتاح!", 'ai'); }
        }

        function add(text, type) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = text;
            c.prepend(d);
        }
    </script>
</body>
</html>
